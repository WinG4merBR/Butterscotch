name: Test Build

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    container:
      image: scummvm/dockerized-toolchains:ps3@sha256:0b89f032c11e454d1613ba8ac5bfb7f36d47ad61e3d4fb798e7639aed0f21e33

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          echo "PS3DEV=$PS3DEV"
          echo "PSL1GHT=$PSL1GHT"
          powerpc64-ps3-elf-gcc --version || true
          make --version

      - name: Clean previous artifacts
        run: make clean || true

      - name: Test build only
        run: make test

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-build-diagnostics
          path: |
            build
            build_ps3
          if-no-files-found: ignore
          retention-days: 7